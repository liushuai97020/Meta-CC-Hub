name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 推送 v1.0.0、v2.1.3 等 tag 时触发

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-2022, macos-13]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --${{ matrix.os == 'windows-2022' && 'win' || 'mac' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (Windows)
        if: matrix.os == 'windows-2022'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe
          if-no-files-found: warn

      - name: Upload Artifacts (macOS)
        if: matrix.os == 'macos-13'
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: release/*.{dmg,zip}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          # 从 CHANGELOG.md 中提取当前版本对应的更新内容
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}
          echo "Extracting notes for version: $VERSION"
          # 提取两个 ## [版本号] 之间的内容
          NOTES=$(awk "/^## \\[$VERSION\\]/,/^## \\[/{ if (!/^## \\[/ || /^## \\[$VERSION\\]/) print }" CHANGELOG.md | tail -n +2 | sed '$d')
          if [ -z "$NOTES" ]; then
            echo "No CHANGELOG entry found for version $VERSION, will use auto-generated notes"
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-installer/*.exe
            macos-installer/*.dmg
            macos-installer/*.zip
          body: ${{ steps.changelog.outputs.has_notes == 'true' && steps.changelog.outputs.notes || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.has_notes != 'true' }}
